<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>CromoMatch — Cromosomas & Química</title>

  <!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║   FUENTES: Google Fonts                                          ║
  ║   Orbitron  → títulos / HUD  (futurista, científica)            ║
  ║   Exo 2     → cuerpo / etiquetas                                ║
  ╚══════════════════════════════════════════════════════════════════╝
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ================================================================
       VARIABLES CSS GLOBALES
       ================================================================ */
    :root {
      /* Paleta */
      --bg-deep:       #050b18;
      --bg-panel:      rgba(6, 18, 40, 0.90);
      --bg-grid:       rgba(4, 14, 34, 0.94);
      --border-glow:   rgba(0, 195, 255, 0.30);
      --cyan:          #00c3ff;
      --green:         #00ffa3;
      --gold:          #ffd85e;
      --pink:          #ff2d9b;
      --danger:        #ff4060;
      --txt-bright:    #def0ff;
      --txt-dim:       #3e6080;

      /* Colores de las 6 fichas — fallback si no hay imagen */
      --t0: #e8344a;   /* Cromosoma X */
      --t1: #f0a500;   /* Cromosoma Y */
      --t2: #00b8a9;   /* Cromosoma 1 */
      --t3: #7c4dff;   /* Adenina     */
      --t4: #00c853;   /* Guanina     */
      --t5: #ff6d00;   /* Timina      */

      /* Layout dinámico (se sobreescribe desde JS) */
      --cell:    48px;
      --gap:      5px;
      --radius:  12px;

      /* Animaciones */
      --t-swap:  220ms;
      --t-pop:   280ms;
      --t-fall:  320ms;

      /* Tipografía */
      --f-title: 'Orbitron', monospace;
      --f-body:  'Exo 2', sans-serif;
    }

    /* ================================================================
       RESET
       ================================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: var(--f-body);
      color: var(--txt-bright);
      background: var(--bg-deep);
    }

    /* ================================================================
       FONDO DEL JUEGO
       ================================================================

       ╔══════════════════════════════════════════════════════════╗
       ║  TODO: IMAGEN DE FONDO PRINCIPAL                         ║
       ║  Reemplaza el gradiente con tu imagen:                   ║
       ║    background: url('tu-fondo.jpg') center/cover fixed;  ║
       ║  O superpón la imagen al gradiente:                      ║
       ║    background:                                           ║
       ║      url('tu-fondo.jpg') center/cover fixed,            ║
       ║      /* ...gradiente abajo... */                         ║
       ╚══════════════════════════════════════════════════════════╝
    */
    #game-bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 90% 55% at 50%  5%, rgba(0,70,160,0.40) 0%, transparent 65%),
        radial-gradient(ellipse 55% 45% at 15% 85%, rgba(0,160,100,0.20) 0%, transparent 60%),
        radial-gradient(ellipse 50% 55% at 90% 55%, rgba(90,0,180,0.24) 0%, transparent 60%),
        linear-gradient(160deg, #05090f 0%, #060e1e 55%, #030810 100%);
    }

    /* Partículas flotantes (moléculas) */
    #particles {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none; overflow: hidden;
    }
    .particle {
      position: absolute; border-radius: 50%;
      animation: particle-rise linear infinite;
    }
    @keyframes particle-rise {
      0%   { transform: translateY(108vh) scale(0.3); opacity: 0; }
      8%   { opacity: 0.55; }
      92%  { opacity: 0.30; }
      100% { transform: translateY(-8vh)  scale(1.1); opacity: 0; }
    }

    /* ================================================================
       CONTENEDOR PRINCIPAL
       ================================================================ */
    #app {
      position: relative; z-index: 2;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 8px 10px 4px;
      gap: 6px; overflow: hidden;
    }

    /* ================================================================
       CABECERA
       ================================================================ */
    header {
      width: 100%; max-width: 440px;
      display: flex; flex-direction: column; align-items: center;
      gap: 2px;
    }

    h1 {
      font-family: var(--f-title);
      font-size: clamp(1rem, 4.8vw, 1.55rem);
      font-weight: 900; letter-spacing: 0.14em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(0,195,255,0.45));
    }

    .subtitle {
      font-size: 0.58rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--txt-dim);
    }

    /* ================================================================
       BARRA DE ESTADÍSTICAS
       ================================================================ */
    .stats-bar {
      width: 100%; max-width: 440px;
      display: flex; justify-content: space-between; gap: 7px;
    }

    .stat-card {
      flex: 1;
      background: var(--bg-panel);
      border: 1px solid var(--border-glow);
      border-radius: 10px; padding: 5px 8px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .stat-card .lbl {
      display: block; font-size: 0.52rem;
      text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--txt-dim); margin-bottom: 1px;
    }

    .stat-card .val {
      font-family: var(--f-title);
      font-size: clamp(0.95rem, 3.8vw, 1.25rem);
      font-weight: 700; color: var(--cyan);
      transition: color 0.3s;
    }
    .stat-card .val.warn   { color: var(--gold); }
    .stat-card .val.danger { color: var(--danger); }

    /* ================================================================
       BARRA DE PROGRESO
       ================================================================ */
    .prog-wrap {
      width: 100%; max-width: 440px;
    }

    .prog-labels {
      display: flex; justify-content: space-between;
      font-size: 0.56rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--txt-dim);
      margin-bottom: 3px;
    }

    .prog-track {
      width: 100%; height: 6px;
      background: rgba(255,255,255,0.07);
      border-radius: 3px; overflow: hidden;
    }

    .prog-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--cyan), var(--green));
      box-shadow: 0 0 8px var(--cyan);
      transition: width 0.55s cubic-bezier(.22,1,.36,1);
      width: 0%;
    }

    /* ================================================================
       CONTENEDOR DEL TABLERO
       ================================================================ */
    #grid-wrap {
      position: relative;
      background: var(--bg-grid);
      border: 1px solid var(--border-glow);
      border-radius: 18px;
      padding: 10px;
      box-shadow:
        0 0 0 1px rgba(0,195,255,0.08),
        0 0 35px rgba(0,60,160,0.45),
        inset 0 0 22px rgba(0,0,0,0.55);
      backdrop-filter: blur(14px);
    }

    /* Scanlines decorativas */
    #grid-wrap::before {
      content: ''; position: absolute;
      inset: 10px; border-radius: 10px;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 6px,
        rgba(0,195,255,0.025) 6px, rgba(0,195,255,0.025) 7px
      );
      pointer-events: none; z-index: 0;
    }

    /* ================================================================
       TABLERO (grid)
       ================================================================ */
    #board {
      position: relative;
      display: grid;
      gap: var(--gap);
      z-index: 1;
      /* grid-template-columns / rows se ponen desde JS */
    }

    /* ================================================================
       FICHAS
       ================================================================ */
    .tile {
      position: relative;
      width: var(--cell); height: var(--cell);
      border-radius: var(--radius);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: calc(var(--cell) * 0.52);
      line-height: 1;
      border: 2px solid transparent;
      transition: transform var(--t-swap) cubic-bezier(.34,1.56,.64,1),
                  box-shadow 0.15s, opacity 0.15s;
      will-change: transform, opacity;
      overflow: hidden;
    }

    /* ─── Gradientes de cada tipo ───────────────────────────────────
       ╔══════════════════════════════════════════════════════════╗
       ║  TODO: IMÁGENES DE FICHAS                                ║
       ║  Para cada tipo agrega background-image en su selector   ║
       ║  O hazlo desde JS: TILES[n].img = 'assets/mi-ficha.png'  ║
       ║                                                           ║
       ║  Ejemplo CSS:                                             ║
       ║  .tile[data-type="0"] {                                   ║
       ║    background-image: url('assets/cromosoma-x.png');       ║
       ║    background-size: cover;                                ║
       ║  }                                                        ║
       ╚══════════════════════════════════════════════════════════╝ */
    .tile[data-type="0"] { background: radial-gradient(135deg, #ff6070 0%, #a00820 100%); }
    .tile[data-type="1"] { background: radial-gradient(135deg, #ffd060 0%, #a06000 100%); }
    .tile[data-type="2"] { background: radial-gradient(135deg, #00dfc8 0%, #006b60 100%); }
    .tile[data-type="3"] { background: radial-gradient(135deg, #b080ff 0%, #3800cc 100%); }
    .tile[data-type="4"] { background: radial-gradient(135deg, #40e880 0%, #006828 100%); }
    .tile[data-type="5"] { background: radial-gradient(135deg, #ffa050 0%, #a02800 100%); }

    /* Reflejo superior (efecto cristal) */
    .tile::before {
      content: ''; position: absolute; inset: 0;
      border-radius: calc(var(--radius) - 2px);
      background: linear-gradient(135deg, rgba(255,255,255,0.28) 0%, transparent 52%);
      pointer-events: none;
    }

    /* ── Estados ── */
    .tile.selected {
      border-color: rgba(255,255,255,0.95);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.38), 0 0 20px rgba(255,255,255,0.55);
      transform: scale(1.12);
      z-index: 5;
    }

    .tile.invalid { animation: shake 0.36s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-7px) rotate(-3deg); }
      40%     { transform: translateX( 7px) rotate( 3deg); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX( 4px); }
    }

    .tile.popping { animation: pop-out var(--t-pop) ease forwards; }
    @keyframes pop-out {
      0%   { transform: scale(1);   opacity: 1; }
      35%  { transform: scale(1.32); opacity: 0.85; }
      65%  { transform: scale(0.55); opacity: 0.4; }
      100% { transform: scale(0);   opacity: 0; }
    }

    .tile.falling { animation: fall-in var(--t-fall) cubic-bezier(.22,1,.36,1) forwards; }
    @keyframes fall-in {
      0%   { transform: translateY(-55px); opacity: 0; }
      100% { transform: translateY(0);     opacity: 1; }
    }

    /* Hover escritorio */
    @media (hover: hover) {
      .tile:not(.selected):hover {
        transform: scale(1.07);
        box-shadow: 0 0 14px rgba(255,255,255,0.28);
      }
    }

    /* Icono dentro de la ficha */
    .tile-icon {
      pointer-events: none;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
    }

    /* ================================================================
       PUNTOS FLOTANTES
       ================================================================ */
    .score-pop {
      position: absolute; z-index: 50;
      font-family: var(--f-title); font-size: 0.8rem; font-weight: 700;
      color: var(--gold); text-shadow: 0 0 8px var(--gold);
      pointer-events: none;
      animation: pts-rise 0.95s ease forwards;
    }
    @keyframes pts-rise {
      0%   { opacity: 1; transform: translateY(0)    scale(1);   }
      30%  { opacity: 1; transform: translateY(-10px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-46px) scale(0.8); }
    }

    /* ================================================================
       LEYENDA EDUCATIVA
       ================================================================ */
    #legend {
      width: 100%; max-width: 440px;
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 6px 10px;
    }
    .leg-item {
      display: flex; align-items: center; gap: 4px;
      font-size: 0.56rem; color: var(--txt-dim);
    }
    .leg-dot {
      width: 11px; height: 11px;
      border-radius: 3px; flex-shrink: 0;
    }

    /* ================================================================
       TOAST DE COMBO
       ================================================================ */
    #combo-toast {
      position: fixed; top: 50%; left: 50%; z-index: 180;
      transform: translate(-50%, -50%) scale(0);
      font-family: var(--f-title); font-size: 2rem; font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 18px var(--gold), 0 0 40px rgba(255,210,0,0.5);
      pointer-events: none;
      opacity: 0;
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), opacity 0.22s;
    }
    #combo-toast.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    /* ================================================================
       MODAL FIN DE JUEGO
       ================================================================ */
    #modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(2, 5, 14, 0.88);
      backdrop-filter: blur(10px);
      align-items: center; justify-content: center;
      padding: 20px;
    }
    #modal-overlay.open { display: flex; }

    #modal-box {
      background: var(--bg-panel);
      border: 1px solid var(--border-glow);
      border-radius: 22px; padding: 30px 26px;
      text-align: center; max-width: 340px; width: 100%;
      box-shadow: 0 0 0 1px rgba(0,195,255,0.12), 0 24px 70px rgba(0,0,0,0.75);
      animation: modal-pop 0.38s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes modal-pop {
      from { transform: scale(0.70) translateY(24px); opacity: 0; }
      to   { transform: scale(1)    translateY(0);    opacity: 1; }
    }

    #modal-icon { font-size: 3.2rem; margin-bottom: 8px; }

    #modal-title {
      font-family: var(--f-title);
      font-size: 1.35rem; font-weight: 900;
      letter-spacing: 0.1em; margin-bottom: 8px;
    }
    #modal-title.win  { color: var(--green); text-shadow: 0 0 12px var(--green); }
    #modal-title.lose { color: var(--danger); text-shadow: 0 0 12px var(--danger); }

    #modal-desc {
      font-size: 0.78rem; color: #6a9abc;
      line-height: 1.65; margin-bottom: 18px;
    }

    .modal-row {
      display: flex; justify-content: space-between;
      font-size: 0.78rem; padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: var(--txt-dim);
    }
    .modal-row strong { font-family: var(--f-title); color: var(--gold); }

    #btn-restart {
      margin-top: 20px; width: 100%; padding: 13px;
      border: none; border-radius: 12px;
      background: linear-gradient(90deg, var(--cyan), #0080ff);
      color: #fff; font-family: var(--f-title);
      font-size: 0.88rem; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 22px rgba(0,180,255,0.42);
      transition: transform 0.14s, box-shadow 0.14s;
    }
    #btn-restart:active {
      transform: scale(0.95);
      box-shadow: 0 2px 10px rgba(0,180,255,0.28);
    }
  </style>
</head>
<body>

  <!-- ================================================================
       FONDO
       TODO: IMAGEN DE FONDO GENERAL
       Reemplaza el div vacío con:
         <div id="game-bg" style="background:url('fondo.jpg') center/cover fixed;"></div>
       ================================================================ -->
  <div id="game-bg"></div>
  <div id="particles"></div>

  <!-- TOAST COMBO -->
  <div id="combo-toast" aria-live="polite"></div>

  <!-- ================================================================
       APP
       ================================================================ -->
  <div id="app">

    <!-- CABECERA -->
    <header>
      <h1>CromoMatch</h1>
      <p class="subtitle">Cromosomas &amp; Química · Juego Educativo</p>
    </header>

    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat-card">
        <span class="lbl">Puntos</span>
        <div class="val" id="ui-score">0</div>
      </div>
      <div class="stat-card">
        <span class="lbl">Movimientos</span>
        <div class="val" id="ui-moves">20</div>
      </div>
      <div class="stat-card">
        <span class="lbl">Objetivo</span>
        <div class="val" id="ui-goal">500</div>
      </div>
    </div>

    <!-- PROGRESO -->
    <div class="prog-wrap">
      <div class="prog-labels">
        <span>Progreso al objetivo</span>
        <span id="ui-pct">0%</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill" id="ui-prog"></div>
      </div>
    </div>

    <!-- TABLERO
         TODO: TEXTURA/IMAGEN DE FONDO DEL TABLERO
         Añade al #grid-wrap: style="background-image:url('celula-bg.png');"
    -->
    <div id="grid-wrap">
      <div id="board" role="grid" aria-label="Tablero Match-3 de Cromosomas"></div>
    </div>

    <!-- LEYENDA EDUCATIVA -->
    <div id="legend" aria-label="Tipos de fichas"></div>

  </div><!-- /app -->

  <!-- ================================================================
       MODAL FIN DE JUEGO
       ================================================================ -->
  <div id="modal-overlay" role="dialog" aria-modal="true">
    <div id="modal-box">
      <div id="modal-icon">🧬</div>
      <div id="modal-title">JUEGO TERMINADO</div>
      <p id="modal-desc"></p>
      <div class="modal-row">
        <span>Puntuación final</span>
        <strong id="m-score">0</strong>
      </div>
      <div class="modal-row">
        <span>Mejor puntuación</span>
        <strong id="m-best">0</strong>
      </div>
      <div class="modal-row">
        <span>Objetivo del nivel</span>
        <strong id="m-goal">500</strong>
      </div>
      <button id="btn-restart">↺ NUEVA PARTIDA</button>
    </div>
  </div>

  <!-- ================================================================
       JAVASCRIPT — LÓGICA COMPLETA
       ================================================================ -->
  <script>
  'use strict';

  /* ================================================================
     ╔════════════════════════════════════════════════════════════╗
     ║  CONFIGURACIÓN CENTRAL DEL JUEGO                          ║
     ╚════════════════════════════════════════════════════════════╝
     ================================================================ */
  const CFG = {
    COLS:         7,      // columnas del tablero
    ROWS:         7,      // filas del tablero
    NTYPES:       6,      // número de tipos de ficha
    MOVES:        20,     // movimientos por partida
    GOAL:         500,    // puntos para ganar

    PTS_3:        30,     // puntos por match-3
    PTS_4:        80,     // puntos por match-4
    PTS_5:        180,    // puntos por match-5
    PTS_EXTRA:    15,     // puntos por cada ficha extra sobre 5

    COMBO_MULT:   1.45,   // multiplicador exponencial por combo

    MS_SWAP:      220,    // ms animación intercambio
    MS_POP:       280,    // ms animación destrucción
    MS_FALL:      310,    // ms animación caída
    MS_STAGGER:   45,     // ms de stagger entre filas
  };

  /* ================================================================
     ╔════════════════════════════════════════════════════════════╗
     ║  DEFINICIÓN DE TIPOS DE FICHA                             ║
     ║                                                            ║
     ║  Para usar imágenes reales, pon la ruta en "img":         ║
     ║    TILES[0].img = 'assets/cromosoma-x.png';               ║
     ║  O directamente aquí en la propiedad.                     ║
     ╚════════════════════════════════════════════════════════════╝
     ================================================================ */
  const TILES = [
    {
      id: 0,
      name: 'Cromosoma X',
      icon: '✕',
      color: '#e8344a',
      // TODO: URL DE IMAGEN — FICHA 0 (CROMOSOMA X)
      // img: 'assets/cromosoma-x.png',
      img: null,
    },
    {
      id: 1,
      name: 'Cromosoma Y',
      icon: 'Y',
      color: '#f0a500',
      // TODO: URL DE IMAGEN — FICHA 1 (CROMOSOMA Y)
      // img: 'assets/cromosoma-y.png',
      img: null,
    },
    {
      id: 2,
      name: 'Cromosoma 1',
      icon: '①',
      color: '#00b8a9',
      // TODO: URL DE IMAGEN — FICHA 2 (CROMOSOMA 1)
      // img: 'assets/cromosoma-1.png',
      img: null,
    },
    {
      id: 3,
      name: 'Adenina (A)',
      icon: 'A',
      color: '#7c4dff',
      // TODO: URL DE IMAGEN — FICHA 3 (ADENINA)
      // img: 'assets/adenina.png',
      img: null,
    },
    {
      id: 4,
      name: 'Guanina (G)',
      icon: 'G',
      color: '#00c853',
      // TODO: URL DE IMAGEN — FICHA 4 (GUANINA)
      // img: 'assets/guanina.png',
      img: null,
    },
    {
      id: 5,
      name: 'Timina (T)',
      icon: 'T',
      color: '#ff6d00',
      // TODO: URL DE IMAGEN — FICHA 5 (TIMINA)
      // img: 'assets/timina.png',
      img: null,
    },
  ];

  /* ================================================================
     ESTADO DEL JUEGO
     ================================================================ */
  const G = {
    board:      [],      // [row][col] = tipo (0-5) | null
    score:      0,
    moves:      CFG.MOVES,
    best:       +( localStorage.getItem('cm_best') || 0 ),
    selected:   null,    // { r, c } | null
    busy:       false,
    combo:      0,
    over:       false,
  };

  /* ================================================================
     REFERENCIAS DOM
     ================================================================ */
  const $board   = document.getElementById('board');
  const $wrap    = document.getElementById('grid-wrap');
  const $score   = document.getElementById('ui-score');
  const $moves   = document.getElementById('ui-moves');
  const $goal    = document.getElementById('ui-goal');
  const $pct     = document.getElementById('ui-pct');
  const $prog    = document.getElementById('ui-prog');
  const $legend  = document.getElementById('legend');
  const $modal   = document.getElementById('modal-overlay');
  const $mIcon   = document.getElementById('modal-icon');
  const $mTitle  = document.getElementById('modal-title');
  const $mDesc   = document.getElementById('modal-desc');
  const $mScore  = document.getElementById('m-score');
  const $mBest   = document.getElementById('m-best');
  const $mGoal   = document.getElementById('m-goal');
  const $toast   = document.getElementById('combo-toast');
  const $restart = document.getElementById('btn-restart');

  /* ================================================================
     TAMAÑO DINÁMICO DE CELDA
     ================================================================ */
  let CSIZE = 48;
  const GAP = 5;

  function calcCellSize() {
    const aw = window.innerWidth  - 24;     // padding lateral
    const ah = window.innerHeight - 210;    // espacio UI superior + leyenda
    const bw = Math.floor((aw - GAP * (CFG.COLS - 1)) / CFG.COLS);
    const bh = Math.floor((ah - GAP * (CFG.ROWS - 1)) / CFG.ROWS);
    CSIZE = Math.max(30, Math.min(bw, bh, 64));

    document.documentElement.style.setProperty('--cell', CSIZE + 'px');
    document.documentElement.style.setProperty('--gap',  GAP  + 'px');

    const tw = CSIZE * CFG.COLS + GAP * (CFG.COLS - 1) + 20;
    const th = CSIZE * CFG.ROWS + GAP * (CFG.ROWS - 1) + 20;
    $wrap.style.width   = tw + 'px';
    $wrap.style.height  = th + 'px';
    $board.style.width  = (tw - 20) + 'px';
    $board.style.height = (th - 20) + 'px';
    $board.style.gridTemplateColumns = `repeat(${CFG.COLS}, ${CSIZE}px)`;
    $board.style.gridTemplateRows    = `repeat(${CFG.ROWS}, ${CSIZE}px)`;
  }

  /* ================================================================
     ╔════════════════════════════════════════════════════════════╗
     ║  INICIALIZACIÓN                                           ║
     ╚════════════════════════════════════════════════════════════╝
     ================================================================ */
  function init() {
    G.score = 0; G.moves = CFG.MOVES; G.selected = null;
    G.busy  = false; G.combo = 0; G.over = false;
    $modal.classList.remove('open');
    $goal.textContent  = CFG.GOAL;
    $mGoal.textContent = CFG.GOAL;

    calcCellSize();
    buildLegend();
    genBoard();
    renderBoard();
    updateHUD();
  }

  /* ================================================================
     GENERACIÓN DEL TABLERO SIN MATCHES INICIALES
     ================================================================ */
  function genBoard() {
    G.board = Array.from({ length: CFG.ROWS }, () => Array(CFG.COLS).fill(null));
    for (let r = 0; r < CFG.ROWS; r++)
      for (let c = 0; c < CFG.COLS; c++)
        G.board[r][c] = safeType(r, c);
  }

  /** Elige tipo aleatorio que no genere match-3 inmediato */
  function safeType(r, c) {
    const ban = new Set();
    // Chequeo horizontal: 2 previas iguales → prohibir ese tipo
    if (c >= 2 && G.board[r][c-1] !== null && G.board[r][c-1] === G.board[r][c-2])
      ban.add(G.board[r][c-1]);
    // Chequeo vertical
    if (r >= 2 && G.board[r-1][c] !== null && G.board[r-1][c] === G.board[r-2][c])
      ban.add(G.board[r-1][c]);

    let t, tries = 0;
    do { t = randInt(CFG.NTYPES); tries++; } while (ban.has(t) && tries < 30);
    return t;
  }

  /* ================================================================
     RENDERIZADO COMPLETO
     ================================================================ */
  function renderBoard() {
    $board.innerHTML = '';
    for (let r = 0; r < CFG.ROWS; r++)
      for (let c = 0; c < CFG.COLS; c++)
        $board.appendChild(makeTileEl(G.board[r][c], r, c));
  }

  function makeTileEl(type, r, c) {
    const el = document.createElement('div');
    el.className = 'tile';
    el.dataset.r = r; el.dataset.c = c; el.dataset.type = type;
    el.setAttribute('role', 'gridcell');
    el.setAttribute('aria-label', TILES[type].name);

    // ── TODO: aplicar imagen si existe ──────────────────────────
    if (TILES[type].img) {
      el.style.backgroundImage = `url('${TILES[type].img}')`;
      el.style.backgroundSize  = 'cover';
      el.style.backgroundPosition = 'center';
    }

    const icon = document.createElement('span');
    icon.className   = 'tile-icon';
    icon.textContent = TILES[type].icon;
    el.appendChild(icon);

    // Eventos táctiles + mouse
    el.addEventListener('pointerdown', onDown, { passive: false });
    return el;
  }

  function getTile(r, c) {
    return $board.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
  }

  /* ================================================================
     ╔════════════════════════════════════════════════════════════╗
     ║  INTERACCIÓN: POINTER (touch + mouse unificados)          ║
     ╚════════════════════════════════════════════════════════════╝
     ================================================================ */
  let ptr = null; // { x0, y0, r, c, moved }

  function onDown(e) {
    if (G.busy || G.over) return;
    e.preventDefault();
    e.currentTarget.setPointerCapture(e.pointerId);
    ptr = { x0: e.clientX, y0: e.clientY,
            r: +e.currentTarget.dataset.r,
            c: +e.currentTarget.dataset.c,
            moved: false };

    window.addEventListener('pointermove', onMove, { passive: false });
    window.addEventListener('pointerup',   onUp,   { passive: false });
    window.addEventListener('pointercancel', onCancel);
  }

  function onMove(e) {
    if (!ptr || G.busy) return;
    e.preventDefault();
    const dx = e.clientX - ptr.x0;
    const dy = e.clientY - ptr.y0;
    const dist = Math.hypot(dx, dy);
    const threshold = CSIZE * 0.38;

    if (dist > threshold * 0.5) ptr.moved = true;

    if (dist >= threshold) {
      const { r: r1, c: c1 } = ptr;
      ptr = null;
      removePointerListeners();

      const dir = Math.abs(dx) >= Math.abs(dy)
        ? { dr: 0, dc: dx > 0 ? 1 : -1 }
        : { dr: dy > 0 ? 1 : -1, dc: 0 };

      const r2 = r1 + dir.dr, c2 = c1 + dir.dc;
      if (inBounds(r2, c2)) {
        clearSel();
        trySwap(r1, c1, r2, c2);
      }
    }
  }

  function onUp(e) {
    if (!ptr) { removePointerListeners(); return; }
    const { r, c, moved } = ptr;
    ptr = null;
    removePointerListeners();
    if (!moved) handleTap(r, c);
  }

  function onCancel() {
    ptr = null;
    removePointerListeners();
  }

  function removePointerListeners() {
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup',   onUp);
    window.removeEventListener('pointercancel', onCancel);
  }

  /* ── Lógica de TAP (selección doble) ─────────────────────────── */
  function handleTap(r, c) {
    if (G.busy || G.over) return;

    if (!G.selected) {
      G.selected = { r, c };
      getTile(r, c)?.classList.add('selected');
      return;
    }

    const { r: sr, c: sc } = G.selected;

    if (sr === r && sc === c) {          // misma ficha → deseleccionar
      clearSel(); return;
    }

    clearSel();

    if (Math.abs(sr - r) + Math.abs(sc - c) === 1) {
      trySwap(sr, sc, r, c);            // adyacente → intentar swap
    } else {
      G.selected = { r, c };            // no adyacente → re-seleccionar
      getTile(r, c)?.classList.add('selected');
    }
  }

  function clearSel() {
    if (G.selected) {
      getTile(G.selected.r, G.selected.c)?.classList.remove('selected');
      G.selected = null;
    }
  }

  /* ================================================================
     ╔════════════════════════════════════════════════════════════╗
     ║  SWAP + CASCADA PRINCIPAL                                 ║
     ╚════════════════════════════════════════════════════════════╝
     ================================================================ */
  async function trySwap(r1, c1, r2, c2) {
    if (G.busy || G.over) return;
    G.busy = true; G.combo = 0;

    // Dirección del movimiento
    const dr = r2 - r1, dc = c2 - c1;

    // Animar intercambio
    await animSwap(r1, c1, r2, c2, dr, dc, false);
    doSwap(r1, c1, r2, c2);

    // Buscar matches
    let matches = findMatches();

    if (!matches.size) {
      // Movimiento inválido: revertir
      doSwap(r1, c1, r2, c2);
      await animSwap(r1, c1, r2, c2, dr, dc, true);
      flashInvalid(r1, c1, r2, c2);
      G.busy = false;
      return;
    }

    // Movimiento válido
    G.moves--;
    updateHUD();

    await cascade(matches);
    G.busy = false;
    checkEnd();
  }

  function doSwap(r1, c1, r2, c2) {
    [G.board[r1][c1], G.board[r2][c2]] = [G.board[r2][c2], G.board[r1][c1]];
  }

  /* ================================================================
     ANIMACIÓN DE INTERCAMBIO
     ================================================================ */
  function animSwap(r1, c1, r2, c2, dr, dc, reverse) {
    return new Promise(resolve => {
      const e1 = getTile(r1, c1), e2 = getTile(r2, c2);
      if (!e1 || !e2) { resolve(); return; }

      const d = CSIZE + GAP;
      const s = reverse ? -1 : 1;
      const tx1 =  dc * d * s, ty1 =  dr * d * s;
      const tx2 = -dc * d * s, ty2 = -dr * d * s;

      const dur = CFG.MS_SWAP + 'ms';
      const ease = 'cubic-bezier(.34,1.24,.64,1)';

      [e1, e2].forEach(e => { e.style.transition = `transform ${dur} ${ease}`; e.style.zIndex = '8'; });
      e1.style.transform = `translate(${tx1}px,${ty1}px)`;
      e2.style.transform = `translate(${tx2}px,${ty2}px)`;

      setTimeout(() => {
        [e1, e2].forEach(e => { e.style.transition = ''; e.style.transform = ''; e.style.zIndex = ''; });
        if (!reverse) {
          e1.dataset.r = r2; e1.dataset.c = c2;
          e2.dataset.r = r1; e2.dataset.c = c1;
        }
        resolve();
      }, CFG.MS_SWAP + 15);
    });
  }

  function flashInvalid(r1, c1, r2, c2) {
    [getTile(r1,c1), getTile(r2,c2)].forEach(el => {
      if (!el) return;
      el.classList.add('invalid');
      setTimeout(() => el.classList.remove('invalid'), 400);
    });
  }

  /* ================================================================
     ╔════════════════════════════════════════════════════════════╗
     ║  DETECCIÓN DE MATCHES                                     ║
     ╚════════════════════════════════════════════════════════════╝
     ================================================================ */
  function findMatches() {
    const hit = new Set(); // claves "r,c"

    // Horizontal
    for (let r = 0; r < CFG.ROWS; r++) {
      let run = 1;
      for (let c = 1; c <= CFG.COLS; c++) {
        if (c < CFG.COLS && G.board[r][c] !== null && G.board[r][c] === G.board[r][c-1]) {
          run++;
        } else {
          if (run >= 3) for (let k = 0; k < run; k++) hit.add(`${r},${c-1-k}`);
          run = 1;
        }
      }
    }

    // Vertical
    for (let c = 0; c < CFG.COLS; c++) {
      let run = 1;
      for (let r = 1; r <= CFG.ROWS; r++) {
        if (r < CFG.ROWS && G.board[r][c] !== null && G.board[r][c] === G.board[r-1][c]) {
          run++;
        } else {
          if (run >= 3) for (let k = 0; k < run; k++) hit.add(`${r-1-k},${c}`);
          run = 1;
        }
      }
    }

    return hit;
  }

  /* ================================================================
     CASCADA: destruir → gravedad → rellenar → repetir
     ================================================================ */
  async function cascade(matches) {
    while (matches.size > 0) {
      G.combo++;

      // Puntuar
      scoreMatches(matches);
      if (G.combo >= 2) showCombo(G.combo);

      // Destruir (animación)
      await animPop(matches);

      // Eliminar del board
      for (const k of matches) {
        const [r, c] = k.split(',').map(Number);
        G.board[r][c] = null;
      }

      // Gravedad + relleno
      applyGravity();

      // Renderizar con animación de caída
      await animFall();

      // Buscar nuevos matches
      matches = findMatches();
    }
  }

  /* ================================================================
     SISTEMA DE PUNTUACIÓN
     ================================================================ */
  function scoreMatches(matches) {
    // Agrupar por longitud de secuencias para puntuar correctamente
    let pts = calcPts(matches.size);

    // Multiplicador de combo
    if (G.combo >= 2) pts = Math.round(pts * Math.pow(CFG.COMBO_MULT, G.combo - 1));

    G.score += pts;
    updateHUD();

    // Flotar puntos en la primera ficha del match
    const [fr, fc] = matches.values().next().value.split(',').map(Number);
    floatScore(fr, fc, pts);
  }

  function calcPts(n) {
    // Calcula puntos basados en el total de fichas eliminadas
    if (n <= 0) return 0;
    if (n <= 3) return CFG.PTS_3;
    if (n === 4) return CFG.PTS_4;
    if (n === 5) return CFG.PTS_5;
    return CFG.PTS_5 + (n - 5) * CFG.PTS_EXTRA;
  }

  function floatScore(r, c, pts) {
    const el = getTile(r, c);
    if (!el) return;
    const pop = document.createElement('div');
    pop.className = 'score-pop';
    pop.textContent = '+' + pts;
    el.appendChild(pop);
    setTimeout(() => pop.remove(), 1000);
  }

  /* ================================================================
     TOAST COMBO
     ================================================================ */
  let _comboT = null;
  function showCombo(n) {
    clearTimeout(_comboT);
    const msgs = { 2:'¡COMBO!', 3:'¡COMBO x3!', 4:'¡SUPER COMBO!', 5:'🔥 MEGA!', 6:'⚡ ULTRA!!' };
    $toast.textContent = msgs[Math.min(n, 6)] ?? `🔥 COMBO x${n}!`;
    $toast.classList.add('show');
    _comboT = setTimeout(() => $toast.classList.remove('show'), 950);
  }

  /* ================================================================
     ANIMACIÓN: DESTRUCCIÓN
     ================================================================ */
  function animPop(matches) {
    return new Promise(resolve => {
      let done = 0;
      const total = matches.size;

      for (const k of matches) {
        const [r, c] = k.split(',').map(Number);
        const el = getTile(r, c);
        if (!el) { if (++done >= total) resolve(); continue; }
        el.classList.add('popping');
        el.addEventListener('animationend', () => { if (++done >= total) resolve(); }, { once: true });
      }

      // Fallback de seguridad
      setTimeout(resolve, CFG.MS_POP + 60);
    });
  }

  /* ================================================================
     GRAVEDAD
     ================================================================ */
  function applyGravity() {
    for (let c = 0; c < CFG.COLS; c++) {
      let write = CFG.ROWS - 1;
      // Mover fichas existentes hacia abajo
      for (let r = CFG.ROWS - 1; r >= 0; r--) {
        if (G.board[r][c] !== null) {
          G.board[write][c] = G.board[r][c];
          if (write !== r) G.board[r][c] = null;
          write--;
        }
      }
      // Rellenar huecos superiores con nuevas fichas aleatorias
      for (let r = write; r >= 0; r--) {
        G.board[r][c] = randInt(CFG.NTYPES);
      }
    }
  }

  /* ================================================================
     ANIMACIÓN: CAÍDA
     ================================================================ */
  function animFall() {
    return new Promise(resolve => {
      $board.innerHTML = '';
      let maxDelay = 0;

      for (let r = 0; r < CFG.ROWS; r++) {
        for (let c = 0; c < CFG.COLS; c++) {
          const el = makeTileEl(G.board[r][c], r, c);
          // Las filas superiores caen con más retraso (efecto cascada)
          const delay = (CFG.ROWS - 1 - r) * CFG.MS_STAGGER;
          el.style.animationDelay = delay + 'ms';
          el.classList.add('falling');
          $board.appendChild(el);
          maxDelay = Math.max(maxDelay, delay);
        }
      }

      setTimeout(resolve, CFG.MS_FALL + maxDelay + 40);
    });
  }

  /* ================================================================
     HUD
     ================================================================ */
  function updateHUD() {
    $score.textContent = G.score;
    $moves.textContent = G.moves;

    $moves.className = 'val';
    if (G.moves <= 4) $moves.classList.add('danger');
    else if (G.moves <= 8) $moves.classList.add('warn');

    const p = Math.min(100, Math.round(G.score / CFG.GOAL * 100));
    $prog.style.width = p + '%';
    $pct.textContent  = p + '%';
  }

  /* ================================================================
     FIN DE JUEGO
     ================================================================ */
  function checkEnd() {
    if (G.over) return;
    const won = G.score >= CFG.GOAL;
    const lost = G.moves <= 0 && !won;
    if (!won && !lost) return;

    G.over = true;
    if (G.score > G.best) {
      G.best = G.score;
      localStorage.setItem('cm_best', G.best);
    }
    setTimeout(() => openModal(won), 650);
  }

  function openModal(won) {
    $mIcon.textContent  = won ? '🎉' : '🧬';
    $mTitle.textContent = won ? '¡NIVEL COMPLETADO!' : 'JUEGO TERMINADO';
    $mTitle.className   = won ? 'win' : 'lose';
    $mDesc.textContent  = won
      ? '¡Brillante! Has alcanzado el objetivo y demostrado tus conocimientos de cromosomas y química. ¡Sigue así!'
      : 'Se agotaron los movimientos. ¡Inténtalo de nuevo y supera tu récord!';
    $mScore.textContent = G.score;
    $mBest.textContent  = G.best;
    $modal.classList.add('open');
  }

  /* ================================================================
     LEYENDA
     ================================================================ */
  function buildLegend() {
    $legend.innerHTML = '';
    TILES.forEach(t => {
      const item = document.createElement('div');
      item.className = 'leg-item';
      const dot = document.createElement('div');
      dot.className    = 'leg-dot';
      dot.style.background = t.color;
      const lbl = document.createElement('span');
      lbl.textContent = t.name;
      item.appendChild(dot);
      item.appendChild(lbl);
      $legend.appendChild(item);
    });
  }

  /* ================================================================
     PARTÍCULAS DE FONDO
     ================================================================ */
  function initParticles() {
    const pEl = document.getElementById('particles');
    const colors = ['#00c3ff','#00ffa3','#ffd85e','#ff2d9b','#7c4dff','#ff6d00'];
    for (let i = 0; i < 24; i++) {
      const p    = document.createElement('div');
      p.className = 'particle';
      const sz   = 4 + Math.random() * 9;
      const col  = colors[i % colors.length];
      const dur  = 9 + Math.random() * 13;
      const del  = -Math.random() * 16;
      p.style.cssText = `
        width:${sz}px; height:${sz}px;
        left:${Math.random()*100}%;
        background:${col};
        box-shadow:0 0 ${sz*2}px ${col};
        opacity:0.4;
        animation-duration:${dur}s;
        animation-delay:${del}s;
      `;
      pEl.appendChild(p);
    }
  }

  /* ================================================================
     UTILIDADES
     ================================================================ */
  function randInt(n) { return Math.floor(Math.random() * n); }
  function inBounds(r, c) { return r >= 0 && r < CFG.ROWS && c >= 0 && c < CFG.COLS; }

  /* ================================================================
     EVENTOS GLOBALES
     ================================================================ */
  $restart.addEventListener('click', init);

  let _rz;
  window.addEventListener('resize', () => {
    clearTimeout(_rz);
    _rz = setTimeout(() => { calcCellSize(); renderBoard(); }, 180);
  });

  window.addEventListener('keydown', e => {
    if (e.key === 'r' || e.key === 'R') init();
  });

  /* ================================================================
     ARRANQUE
     ================================================================ */
  initParticles();
  init();

  // Guía para el desarrollador
  console.log('%c🧬 CromoMatch — Match-3 Educativo', 'color:#00c3ff;font-size:15px;font-weight:bold;');
  console.log('%c📌 Para imágenes de fichas, edita TILES[n].img = "ruta/imagen.png"', 'color:#00ffa3;font-size:12px;');
  console.log('%c📌 Para fondo general, edita el CSS de #game-bg o agrega background-image', 'color:#ffd85e;font-size:12px;');
  console.log('%c📌 Para fondo del tablero, agrega background-image a #grid-wrap', 'color:#ff2d9b;font-size:12px;');
  </script>
</body>
</html>
